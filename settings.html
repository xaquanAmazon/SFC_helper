<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <script src="settings.js" defer></script>
  <script src="global.js" defer></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    
    h1 {
      color: #667eea;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 25px;
      text-align: center;
      padding-bottom: 20px;
      border-bottom: 3px solid #f0f0f0;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    input, textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    
    textarea {
      resize: vertical;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    
    button {
      width: 48%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    #resetSettingsButton {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      margin-left: 4%;
    }
    
    #resetSettingsButton:hover {
      box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
    }
    
    .button-group {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #f0f0f0;
    }
    
    .info-text {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 12px 15px;
      margin-bottom: 20px;
      border-radius: 6px;
      font-size: 13px;
      color: #555;
    }
    
    .info-text strong {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SFC Helper Settings</h1>
    
    <div class="info-text">
      <strong>Tip:</strong> Use <code>{SITE}</code> and <code>{SFC}</code> as placeholders in URLs. Use <code>{TICKET}</code> for ticket URLs.
    </div>
    
    <div class="input-group">
      <label for="defaultSite">Default Site</label>
      <input type="text" id="defaultSite" placeholder="e.g., S133">
    </div>
    
    <div class="input-group">
      <label for="defaultUrlMes">Default MES URL Template</label>
      <textarea id="defaultUrlMes" placeholder="https://manufacture.prod.mes.kbobjects.com/..." rows="3"></textarea>
    </div>
    
    <div class="input-group">
      <label for="defaultUrlJiraTicket">Default JIRA Ticket URL Template</label>
      <textarea id="defaultUrlJiraTicket" placeholder="https://jira.kbobjects.com/browse/TEST-{TICKET}" rows="2"></textarea>
    </div>
    
    <div class="input-group">
      <label for="defaultUrlWrmTicket">Default WRM Ticket URL Template</label>
      <textarea id="defaultUrlWrmTicket" placeholder="https://ui.prod.console.mse.kuiper.amazon.dev/..." rows="2"></textarea>
    </div>
    
    <div class="button-group">
      <button id="saveSettingsButton">Save Settings</button>
      <button id="resetSettingsButton">Reset to Defaults</button>
    </div>
  </div>
</body>
</html>
