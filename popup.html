<!DOCTYPE html>
<html>
<head>
  <title>SFC Helper</title>
  <script src="global.js" defer></script>
  <script src="popup.js" defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 450px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    
    .container {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    h1 {
      color: #667eea;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .input-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      font-size: 13px;
    }
    
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    textarea#sfcString {
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    
    button {
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    #copyLinksButton {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    
    #copyLinksButton:hover {
      box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
    }
    
    .inline-group {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    
    .inline-group .input-container {
      flex: 1;
    }
    
    .inline-group button {
      flex-shrink: 0;
      width: auto;
      padding: 10px 20px;
      margin-bottom: 0;
      white-space: nowrap;
    }
    
    .settings-link {
      text-align: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 2px solid #f0f0f0;
    }
    
    .settings-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      transition: color 0.3s ease;
    }
    
    .settings-link a:hover {
      color: #764ba2;
      text-decoration: underline;
    }
    
    .readonly-field {
      background-color: #f8f8f8;
      cursor: not-allowed;
    }
    
    .info-badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SFC Helper</h1>

    <div class="input-group inline-group">
      <div class="input-container">
        <label for="ticketNumber">Ticket Number <span class="info-badge">WRM/JIRA</span></label>
        <input type="text" id="ticketNumber" placeholder="WR400 or 21506">
      </div>
      <button id="openTicketButton">Open</button>
    </div>

    <div class="input-group">
      <label for="groupName">Group Name</label>
      <input type="text" id="groupName" placeholder="Auto-generated from part info">
    </div>

    <div class="input-group">
      <label for="workingSite">Site ID</label>
      <input type="text" id="workingSite" placeholder="e.g., S133">
    </div>

    <div class="input-group">
      <label for="sfcString">SFC List <span class="info-badge">Auto-filled from tickets</span></label>
      <textarea id="sfcString" placeholder="Enter SFCs (one per line) or open a JIRA/WRM ticket to auto-load" rows="10"></textarea>
    </div>

    <div class="input-group">
      <label for="urlMesTemplate">MES URL Template</label>
      <textarea id="urlMesTemplate" class="readonly-field" rows="2" readonly></textarea>
    </div>

    <button id="openTabsButton">Open MES Tabs</button>
    <button id="copyLinksButton">Copy SFC Links</button>
    
    <div class="settings-link">
      <a href="settings.html" target="_blank">Settings</a>
    </div>
  </div>
</body>
</html>
